<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call — Messagerie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #08090d;
            --surface: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #6366f1;
            --accent2: #a855f7;
            --text: #f0f0f5;
            --muted: #6b6b80;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Orbs */
        .bg-orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
            animation: drift 12s ease-in-out infinite alternate;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: var(--accent);
            top: -150px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: var(--accent2);
            bottom: -100px;
            right: -80px;
            animation-delay: -4s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: #06b6d4;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -8s;
        }

        @keyframes drift {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(30px, 20px) scale(1.05);
            }
        }

        /* Main content */
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 24px;
            animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(28px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 52px;
            font-weight: 800;
            color: white;
            letter-spacing: -1px;
            margin-bottom: 16px;
        }

        .tagline {
            font-size: 17px;
            color: var(--muted);
            max-width: 340px;
            line-height: 1.6;
            margin-bottom: 48px;
        }

        .features {
            display: flex;
            gap: 12px;
            margin-bottom: 48px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .feature-pill {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 8px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 13px;
            color: var(--muted);
            animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .feature-pill:nth-child(1) {
            animation-delay: 0.1s;
        }

        .feature-pill:nth-child(2) {
            animation-delay: 0.18s;
        }

        .feature-pill:nth-child(3) {
            animation-delay: 0.26s;
        }

        .feature-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
        }

        .cta-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 50px;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.01em;
        }

        .btn-primary {
            background: white;
            color: #08090d;
            border: none;
        }

        .btn-primary:hover {
            opacity: 0.88;
            transform: scale(1.1);
        }

        .btn-secondary {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--surface);
            color: var(--text);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .btn:active {
            transform: scale(0.97);
        }

        /* Bottom hint */
        .hint {
            position: fixed;
            bottom: 28px;
            font-size: 12px;
            color: var(--muted);
            opacity: 0.5;
            z-index: 1;
        }
    </style>
</head>

<body>

    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="content">
        <div class="logo">CALL</div>
        <p class="tagline">Messagerie temps réel, simple et rapide. Chatte avec tes amis en un instant.</p>


        <div class="cta-group">
            <a href="login.html?tab=register" class="btn btn-primary">Commencer</a>
            <a href="chat.html" class="btn btn-secondary">J'ai déja un compte</a>
        </div>
    </div>

    <div class="hint">Aucune installation requise</div>

    <script>
        // If already logged in, redirect to chat
        if (localStorage.getItem('user')) window.location.href = 'chat.html';

        // Handle register tab param
        const params = new URLSearchParams(window.location.search);
        if (params.get('tab') === 'register') {
            window.location.href = 'login.html#register';
        }
    </script>
</body>

</html>
