<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus — Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #07080c;
            --panel: #0d0f18;
            --surface: rgba(255, 255, 255, 0.04);
            --surface-hover: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.07);
            --accent: #6366f1;
            --accent2: #a855f7;
            --text: #e8e8f0;
            --muted: #5a5a72;
            --muted2: #3a3a52;
            --bubble-me: #4f52e0;
            --bubble-other: #15162a;
            --online: #22c55e;
            --error: #f87171;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ===== LAYOUT ===== */
        .app {
            display: flex;
            height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 260px;
            flex-shrink: 0;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px 16px 12px;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 20px;
            background: white;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 14px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 9px 12px 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            border-color: var(--accent);
        }

        .search-box input::placeholder {
            color: var(--muted);
        }

        .search-box input:hover{
            background: rgba(255, 255, 255, 0.08);
        }

        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 13px;
        }

        .channels-label {
            padding: 16px 16px 8px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 8px 8px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 10px;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
            transition: all 0.3s;
        }

        .user-item:hover {
            background: var(--surface-hover);
            transform: scale(1);
        }

        .user-item.active {
            background: rgba(99, 102, 241, 0.15);
            transform: scale(0.97);
        }

        .user-item.active .user-name {
            color: #a5b4fc;
            transform: scale(0.95);
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 13px;
            color: white;
            flex-shrink: 0;
            position: relative;
        }

        .avatar-status {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--online);
            border: 2px solid var(--panel);
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-status {
            font-size: 11px;
            color: var(--muted);
        }

        .unread-badge {
            background: var(--accent);
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 20px;
            min-width: 20px;
            text-align: center;
        }

        .me-bar {
            padding: 12px 16px;
            border-top: 10px solid black transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .me-bar .me-info {
            flex: 1;
        }

        .me-bar .me-name {
            font-size: 13px;
            font-weight: 600;
        }

        .me-bar .me-tag {
            font-size: 11px;
            color: var(--muted);
        }

        .logout-btn {
            padding: 6px 8px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 80px;
            color: var(--muted);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.15s;
        }

        .logout-btn:hover {
            background: rgba(248, 113, 113, 0.1);
            border-color: rgba(248, 113, 113, 0.3);
            color: var(--error);
        }

        /* ===== MAIN CHAT ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            padding: 0 20px;
            border-radius: 50px;
            margin: 10px;
            height: 60px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            background: rgba(13, 15, 24, 0.8);
            backdrop-filter: blur(8px);
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 15px;
        }

        .chat-header-sub {
            font-size: 12px;
            color: var(--muted);
        }

        /* ===== MESSAGES ===== */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .messages-area::-webkit-scrollbar {
            width: 4px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: var(--muted2);
            border-radius: 4px;
        }

        .msg-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 4px;
        }

        .msg-group.me {
            align-items: flex-end;
        }

        .msg-group.other {
            align-items: flex-start;
        }

        .msg-sender-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .msg-group.me .msg-sender-row {
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 11px;
            color: white;
            flex-shrink: 0;
        }

        .msg-sender-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
        }

        .msg-bubble {
            max-width: 480px;
            padding: 10px 14px;
            border-radius: 4px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            position: relative;
        }

        .msg-group.me .msg-bubble {
            background: var(--bubble-me);
            color: white;
            border-radius: 16px 4px 16px 16px;
        }

        .msg-group.other .msg-bubble {
            background: var(--bubble-other);
            color: var(--text);
            border-radius: 4px 16px 16px 16px;
        }

        .msg-time {
            font-size: 10px;
            color: var(--muted);
            margin-top: 3px;
            padding: 0 4px;
        }

        .date-separator {
            text-align: center;
            margin: 16px 0 12px;
        }

        .date-separator span {
            font-size: 11px;
            color: var(--muted);
            background: var(--panel);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        /* ===== TYPING INDICATOR ===== */
        .typing-bar {
            padding: 6px 20px;
            min-height: 28px;
            font-size: 12px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .typing-dots {
            display: flex;
            gap: 3px;
            align-items: center;
        }

        .typing-dots span {
            width: 5px;
            height: 5px;
            background: var(--muted);
            border-radius: 50%;
            animation: typingBounce 1.2s ease-in-out infinite;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.5;
            }

            30% {
                transform: translateY(-4px);
                opacity: 1;
            }
        }

        /* ===== INPUT ===== */
        .input-area {
            padding: 12px 20px 16px;
            flex-shrink: 0;
            background: transparent;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 54px;
            padding: 8px 8px 8px 16px;
            transition: border-color 0.2s;
        }

        .input-row:focus-within {
            border-color: rgba(99, 102, 241, 0.4);
        }

        .input-row input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
        }

        .input-row input::placeholder {
            color: var(--muted);
        }

        .send-btn {
            width: 36px;
            height: 36px;
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.06);
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            opacity: 0.85;
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* ===== NOTIFICATION TOAST ===== */
        .notif {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .notif-item {
            background: rgba(13, 15, 24, 0.95);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 12px;
            padding: 12px 16px;
            min-width: 220px;
            max-width: 300px;
            animation: notifSlide 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
            backdrop-filter: blur(12px);
        }

        @keyframes notifSlide {
            from {
                opacity: 0;
                transform: translateX(40px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .notif-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .notif-body {
            font-size: 12px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            gap: 12px;
        }

        .empty-icon {
            font-size: 48px;
            opacity: 0.3;
        }

        .empty-text {
            font-size: 14px;
        }

        /* SCROLLBAR */
        .users-list::-webkit-scrollbar {
            width: 3px;
        }

        .users-list::-webkit-scrollbar-thumb {
            background: var(--muted2);
            border-radius: 3px;
        }
    </style>
</head>

<body>

    <div class="app">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">CALL</div>
                <div class="search-box">
                    <input id="searchInput" placeholder="Rechercher..." oninput="filterUsers()">
                </div>
            </div>

            <div class="channels-label">Conversations</div>
            <div class="users-list" id="usersList"></div>

            <div class="me-bar">
                <div class="avatar" id="myAvatar"></div>
                <div class="me-info">
                    <div class="me-name" id="myName"></div>
                    <div class="me-tag">En ligne</div>
                </div>
                <button class="logout-btn" onclick="logout()" title="Déconnexion">⏻</button>
            </div>
        </div>

        <!-- MAIN CHAT -->
        <div class="main">
            <div class="chat-header" id="chatHeader">
                <div class="avatar" id="chatAvatar" style="width:36px;height:36px;font-size:14px;"></div>
                <div class="chat-header-info">
                    <div class="chat-header-name" id="chatName">Global</div>
                    <div class="chat-header-sub" id="chatSub">Canal principal</div>
                </div>
            </div>

            <div class="messages-area" id="messagesArea"></div>

            <div class="typing-bar" id="typingBar"></div>

            <div class="input-area">
                <div class="input-row">
                    <input id="messageInput" placeholder="Envoyer un message..." autocomplete="off">
                </div>
            </div>
        </div>
    </div>

    <div class="notif" id="notifContainer"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // ===== INIT =====
        const user = localStorage.getItem('user');
        if (!user) window.location.href = 'login.html';

        const socket = io();
        let currentChat = 'global';
        let allUsers = [];
        let onlineUsers = [];
        let typingTimers = {};
        let typingUsers = new Set();
        let unreadCounts = {};
        let lastMsgDate = null;
        let typingTimeout = null;

        // Avatar colors
        const COLORS = ['#6366f1', '#a855f7', '#06b6d4', '#f59e0b', '#10b981', '#f43f5e', '#3b82f6', '#84cc16'];
        function getColor(name) {
            let h = 0;
            for (let c of name) h = (h * 31 + c.charCodeAt(0)) % COLORS.length;
            return COLORS[h];
        }
        function initials(name) {
            return name.substring(0, 2).toUpperCase();
        }
        function makeAvatar(el, name, size = 34) {
            el.style.background = getColor(name);
            el.style.width = size + 'px';
            el.style.height = size + 'px';
            el.style.fontSize = (size * 0.38) + 'px';
            el.textContent = initials(name);
        }

        // Init my avatar
        makeAvatar(document.getElementById('myAvatar'), user);
        document.getElementById('myName').textContent = user;

        // ===== SOCKET =====
        socket.emit('join', user);
        socket.emit('load messages');
        socket.emit('load dms', user);

        socket.on('users', (users) => {
            onlineUsers = users;
            renderSidebar();
        });

        socket.on('chat message', (msg) => {
            if (currentChat === 'global') {
                appendMessage(msg);
                scrollToBottom();
            } else if (msg.user !== user) {
                incrementUnread('global');
                showNotif(msg.user, msg.text);
            }
        });

        socket.on('load messages', (msgs) => {
            if (currentChat !== 'global') return;
            clearMessages();
            msgs.forEach(m => appendMessage(m, false));
            scrollToBottom(false);
        });

        socket.on('private message', (dm) => {
            const partner = dm.from === user ? dm.to : dm.from;
            if (currentChat === partner) {
                appendMessage(dm);
                scrollToBottom();
            } else if (dm.from !== user) {
                incrementUnread(dm.from);
                showNotif(dm.from, dm.text);
            }
        });

        socket.on('load dms', (dms) => {
            if (currentChat === 'global') return;
            clearMessages();
            dms
                .filter(d => (d.from === user && d.to === currentChat) || (d.from === currentChat && d.to === user))
                .forEach(d => appendMessage(d, false));
            scrollToBottom(false);
        });

        socket.on('typing', ({ user: typingUser, chat }) => {
            if (chat !== currentChat && !(chat === user && currentChat !== 'global')) return;
            if (typingUser === user) return;
            typingUsers.add(typingUser);
            renderTyping();
            clearTimeout(typingTimers[typingUser]);
            typingTimers[typingUser] = setTimeout(() => {
                typingUsers.delete(typingUser);
                renderTyping();
            }, 3000);
        });

        socket.on('stop typing', ({ user: u }) => {
            typingUsers.delete(u);
            renderTyping();
        });

        // ===== SIDEBAR =====
        function renderSidebar() {
            const list = document.getElementById('usersList');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allUsers.filter(u => u.toLowerCase().includes(search));
            list.innerHTML = '';

            // Global channel
            const globalEl = document.createElement('div');
            globalEl.className = 'user-item' + (currentChat === 'global' ? ' active' : '');
            const globalUnread = unreadCounts['global'] || 0;
            globalEl.innerHTML = `
      <div class="avatar" style="background:linear-gradient(135deg,#6366f1,#a855f7);width:34px;height:34px;font-size:14px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-family:'Syne',sans-serif;font-weight:700;">✦</div>
      <div class="user-info">
        <div class="user-name">Global</div>
        <div class="user-status">Canal principal</div>
      </div>
      ${globalUnread ? `<span class="unread-badge">${globalUnread}</span>` : ''}
    `;
            globalEl.onclick = () => switchChat('global');
            list.appendChild(globalEl);

            // Users
            filtered.forEach(u => {
                const isOnline = onlineUsers.includes(u);
                const unread = unreadCounts[u] || 0;
                const el = document.createElement('div');
                el.className = 'user-item' + (currentChat === u ? ' active' : '');
                const avatarColor = getColor(u);
                el.innerHTML = `
        <div class="avatar" style="background:${avatarColor};width:34px;height:34px;font-size:13px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-family:'Syne',sans-serif;font-weight:700;position:relative;">
          ${initials(u)}
          ${isOnline ? '<span class="avatar-status"></span>' : ''}
        </div>
        <div class="user-info">
          <div class="user-name">${u}</div>
          <div class="user-status">${isOnline ? 'En ligne' : 'Hors ligne'}</div>
        </div>
        ${unread ? `<span class="unread-badge">${unread}</span>` : ''}
      `;
                el.onclick = () => switchChat(u);
                list.appendChild(el);
            });
        }

        function filterUsers() { renderSidebar(); }

        function switchChat(target) {
            currentChat = target;
            typingUsers.clear();
            renderTyping();
            unreadCounts[target] = 0;
            clearMessages();
            lastMsgDate = null;

            // Update header
            const nameEl = document.getElementById('chatName');
            const subEl = document.getElementById('chatSub');
            const avatarEl = document.getElementById('chatAvatar');

            if (target === 'global') {
                nameEl.textContent = 'Global';
                subEl.textContent = 'Canal principal';
                avatarEl.style.background = 'linear-gradient(135deg,#6366f1,#a855f7)';
                avatarEl.style.borderRadius = '10px';
                avatarEl.textContent = '✦';
                socket.emit('load messages');
            } else {
                nameEl.textContent = target;
                const isOn = onlineUsers.includes(target);
                subEl.textContent = isOn ? 'En ligne' : 'Hors ligne';
                avatarEl.style.background = getColor(target);
                avatarEl.style.borderRadius = '10px';
                avatarEl.textContent = initials(target);
                socket.emit('load dms', user);
            }

            renderSidebar();
            document.getElementById('messageInput').focus();
        }

        // ===== MESSAGES =====
        function clearMessages() {
            document.getElementById('messagesArea').innerHTML = '';
            lastMsgDate = null;
        }

        let lastSender = null;
        let lastTime = null;

        function appendMessage(msg, animate = true) {
            const area = document.getElementById('messagesArea');
            const isMe = (msg.user === user || msg.from === user);
            const sender = msg.user || msg.from;
            const time = msg.time ? new Date(msg.time) : new Date();

            // Date separator
            const dateStr = time.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
            if (dateStr !== lastMsgDate) {
                lastMsgDate = dateStr;
                lastSender = null;
                const sep = document.createElement('div');
                sep.className = 'date-separator';
                sep.innerHTML = `<span>${dateStr}</span>`;
                area.appendChild(sep);
            }

            const timeStr = time.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            const sameGroup = lastSender === sender && lastTime && (time - lastTime < 2 * 60 * 1000);

            const group = document.createElement('div');
            group.className = `msg-group ${isMe ? 'me' : 'other'}`;
            if (animate) group.style.animation = 'fadeUp 0.2s ease both';

            if (!sameGroup) {
                // Show avatar + name for "other", just name indicator for me
                const senderRow = document.createElement('div');
                senderRow.className = 'msg-sender-row';
                if (!isMe) {
                    const av = document.createElement('div');
                    av.className = 'msg-avatar';
                    av.style.background = getColor(sender);
                    av.textContent = initials(sender);
                    senderRow.appendChild(av);
                    const name = document.createElement('span');
                    name.className = 'msg-sender-name';
                    name.textContent = sender;
                    senderRow.appendChild(name);
                }
                group.appendChild(senderRow);
            }

            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.textContent = msg.text;
            group.appendChild(bubble);

            const timeEl = document.createElement('div');
            timeEl.className = 'msg-time';
            timeEl.textContent = timeStr;
            group.appendChild(timeEl);

            area.appendChild(group);
            lastSender = sender;
            lastTime = time;
        }

        function scrollToBottom(smooth = true) {
            const area = document.getElementById('messagesArea');
            area.scrollTo({ top: area.scrollHeight, behavior: smooth ? 'smooth' : 'instant' });
        }

        // ===== TYPING =====
        function renderTyping() {
            const bar = document.getElementById('typingBar');
            if (typingUsers.size === 0) { bar.innerHTML = ''; return; }
            const names = [...typingUsers].join(', ');
            bar.innerHTML = `
      <div class="typing-dots"><span></span><span></span><span></span></div>
      <span>${names} ${typingUsers.size > 1 ? 'écrivent' : 'écrit'}...</span>
    `;
        }

        // ===== INPUT =====
        const input = document.getElementById('messageInput');
        input.addEventListener('input', () => {
            socket.emit('typing', { user, chat: currentChat });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('stop typing', { user, chat: currentChat });
            }, 2000);
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
        });

        function send() {
            const text = input.value.trim();
            if (!text) return;
            socket.emit('stop typing', { user, chat: currentChat });

            if (currentChat === 'global') {
                socket.emit('chat message', { user, text });
            } else {
                socket.emit('private message', { from: user, to: currentChat, text });
            }
            input.value = '';
        }

        // ===== UNREAD =====
        function incrementUnread(from) {
            unreadCounts[from] = (unreadCounts[from] || 0) + 1;
            renderSidebar();
        }

        // ===== NOTIFICATIONS =====
        function showNotif(from, text) {
            const container = document.getElementById('notifContainer');
            const el = document.createElement('div');
            el.className = 'notif-item';
            el.innerHTML = `<div class="notif-title">${from}</div><div class="notif-body">${text}</div>`;
            el.onclick = () => {
                switchChat(from);
                el.remove();
            };
            container.appendChild(el);
            setTimeout(() => el.style.opacity = '0', 4000);
            setTimeout(() => el.remove(), 4500);
        }

        // ===== LOAD USERS =====
        async function loadAllUsers() {
            try {
                const res = await fetch('/users');
                const data = await res.json();
                allUsers = data.filter(u => u !== user);
                renderSidebar();
            } catch { }
        }
        loadAllUsers();

        // ===== LOGOUT =====
        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        // Initial render
        renderSidebar();
        document.getElementById('messageInput').focus();

        // Global keyframe for messages
        const style = document.createElement('style');
        style.textContent = `@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }`;
        document.head.appendChild(style);
    </script>
</body>

</html>
